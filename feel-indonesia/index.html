let theme="dark";
function applyTheme(t){

  if(b)b.textContent=(t==="dark")?"☀️":"🌙"; // icon = the mode you'll switch to

}
function toggleTheme(){applyTheme(theme==="dark"?"light":"dark");}

  const steps=[{t:"Support Creator",s:"Grants, incubator",c:C.impact},{t:"Create IP",s:"Film/music/scent",c:C.vc},{t:"Global Distribution",s:"Netflix, Cannes, festivals",c:C.gov},{t:"Multiplier",s:"Tourism, food, music, product",c:"#a78bfa"}];

  </div>

}

  return sectionHead("Activation Principles",`How to Actually<br><span style="color:${C.impact};">Work With Them.</span>`,"The difference between a brand that buys endorsements and an institution that builds culture. These four principles keep Redwoods credible with the taste-making class.",C.impact)+`
  <div class="grid2sm" style="margin-bottom:32px;">${cards}</div>
  <div style="color:var(--muted);letter-spacing:0.1em;margin-bottom:16px;" class="label-up">Quick Map: Who → Which Festival / Initiative</div>
  <div style="overflow-x:auto;"><table><thead><tr><th>Talent / Brand</th><th>Sense</th><th>Best Deployment</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ---------- state + render ---------- */
const subState={senses:0,sixp:0,festivals:"own",kols:"sound"};
let active="narrative";
function render(keepScroll){
  const el=document.getElementById("content");
  if(active==="narrative")el.innerHTML=Narrative();
  else if(active==="senses")el.innerHTML=Senses(subState.senses);
  else if(active==="sixp")el.innerHTML=SixP(subState.sixp);
  else if(active==="festivals")el.innerHTML=Festivals(subState.festivals);
  else if(active==="kols")el.innerHTML=KOLs(subState.kols);
  else if(active==="brands")el.innerHTML=Brands();
  else if(active==="activation")el.innerHTML=Activation();
  // nav buttons
  document.querySelectorAll("#navbtns .navbtn").forEach(b=>b.classList.toggle("active",b.dataset.id===active));
  const idx=nav.findIndex(n=>n.id===active);
  document.getElementById("pageNum").textContent=(idx+1)+" / "+nav.length;
  if(!keepScroll)window.scrollTo({top:0,behavior:"smooth"});
}
function setActive(id){active=id;render();}
function setSub(section,val){subState[section]=val;render();}

// build nav
const nb=document.getElementById("navbtns");
nav.forEach(n=>{const b=document.createElement("button");b.className="navbtn";b.dataset.id=n.id;b.textContent=n.label;b.onclick=()=>setActive(n.id);nb.appendChild(b);});
// color bar
const cb=document.getElementById("colorbar");
senses.forEach(s=>{const d=document.createElement("div");d.style.background=s.color;cb.appendChild(d);});
// footer
document.getElementById("prevBtn").onclick=()=>{const i=nav.findIndex(n=>n.id===active);if(i>0)setActive(nav[i-1].id);};
document.getElementById("nextBtn").onclick=()=>{const i=nav.findIndex(n=>n.id===active);if(i<nav.length-1)setActive(nav[i+1].id);};

applyTheme((function(){try{return localStorage.getItem("fi-theme");}catch(e){return null;}})()||"dark");
</script>
<script defer src="../assets/auth-gate.js"></script>
</body>
