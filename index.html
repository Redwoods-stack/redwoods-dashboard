<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redwoods Park</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f6; --card:#ffffff; --text:#1b2138; --text2:#6b7385; --text3:#9aa2b4;
    --accent:#5b50e8; --accent-2:#8b83f5; --border:rgba(28,35,60,0.08);
    --shadow:0 12px 40px rgba(28,35,60,0.10);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(91,80,232,0.10), transparent 60%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:3rem 2.6rem;
    max-width:440px;
    width:100%;
    text-align:center;
  }
  .logo{
    width:60px;height:60px;margin:0 auto 1.4rem;
    border-radius:16px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:1.5rem;
    box-shadow:0 8px 22px rgba(91,80,232,0.35);
  }
  .eyebrow{
    font-size:0.7rem;font-weight:700;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--text3);margin-bottom:0.6rem;
  }
  h1{font-size:1.85rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.6rem;}
  p.sub{color:var(--text2);font-size:0.98rem;line-height:1.55;margin-bottom:2rem;}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--accent);color:#fff;
    font-family:inherit;font-size:1rem;font-weight:700;
    text-decoration:none;
    padding:14px 26px;border-radius:13px;
    box-shadow:0 8px 20px rgba(91,80,232,0.30);
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:hover{background:#4b41d6;transform:translateY(-2px);box-shadow:0 12px 26px rgba(91,80,232,0.38);}
  .btn:active{transform:translateY(0);}
  .btn svg{width:18px;height:18px;}
  .foot{margin-top:1.8rem;font-size:0.78rem;color:var(--text3);}
  .foot a{color:var(--text2);text-decoration:none;border-bottom:1px dotted var(--border);}
  .foot a:hover{color:var(--accent);}
</style>
</head>
<body>
  <main class="card">
    <div class="logo">R</div>
    <div class="eyebrow">Redwoods Solutions</div>
    <h1>Financial Workspace</h1>
    <p class="sub">Financial models, projections and build-cost analysis across your development projects.</p>
    <a class="btn" href="projects/">
      Project list
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    <p class="foot">1 active project</p>
  </main>
</body>
</html>
